spring.application.name=bulkvalidation-consumer

# ── Oracle Database ────────────────────────────────────────────────────────
# Same DB as the producer — the consumer reads & updates WfWoBulkQueue rows.
spring.datasource.url=jdbc:oracle:thin:@10.1.1.85:1521:wfm
spring.datasource.username=MTS_WFM_2017
spring.datasource.password=mts2017A
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Run on a different port so both apps can start locally at the same time
server.port=8082

# ── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Connection Pool (HikariCP) ─────────────────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ── Kafka Consumer ─────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092

# Consumer group — all instances of this app share the same group so that
# each message is processed by exactly one instance (competing-consumer pattern).
spring.kafka.consumer.group-id=bulk-validation-group
spring.kafka.consumer.auto-offset-reset=earliest



# Producer uses JsonSerializer for values
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all

# Consumer config: JSON deserializer for values

# if producer sets __TypeId__ header referencing a different FQN, disable usage of headers:

# Trust the BulkQueueEvent class from either package (producer or consumer).

# Map the incoming type header to the consumer-side class.
spring.kafka.consumer.properties.spring.json.type.mapping=bulkQueueEvent:com.mts.bulkvalidation.dto.BulkQueueEvent

# How many messages this consumer fetches per poll cycle.
spring.kafka.consumer.max-poll-records=10

kafka.topic.bulk-queue-validation=bulk-queue-validation

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.mts.bulkvalidation.dto.BulkQueueEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.trusted.packages=com.mts.bulkvalidation.dto